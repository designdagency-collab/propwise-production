<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="upblock.ai">
  <title>upblock.ai</title>
  <!-- House outline: peaked roof with rounded corners, open base -->
  <path
    d="M 35 180 L 35 90 Q 35 80 42 73 L 95 28 Q 105 20 115 28 L 168 73 Q 175 80 175 90 L 175 180"
    fill="none"
    stroke="#1F2937"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- 4 gold window squares (2x2 grid) -->
  <rect x="62"  y="98"  width="32" height="32" rx="4" fill="#C9A961"/>
  <rect x="116" y="98"  width="32" height="32" rx="4" fill="#C9A961"/>
  <rect x="62"  y="142" width="32" height="32" rx="4" fill="#C9A961"/>
  <rect x="116" y="142" width="32" height="32" rx="4" fill="#C9A961"/>

  <!-- Wordmark -->
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
     font-weight="900"
     font-size="120"
     letter-spacing="-4">
    <text x="220" y="148" fill="#1F2937">upblock</text>
    <text x="600" y="148" fill="#C9A961">.ai</text>
  </g>
</svg>
